<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Progress — Father's Advice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --black:       #0a0a08;
      --cream:       #f5f2eb;
      --white:       #ffffff;
      --text:        #1a1a18;
      --muted:       #6b6b65;
      --accent:      #5e6ad2;
      --accent-deep: #4a54b8;
      --accent-border: rgba(94,106,210,0.35);
      --accent-glow:   rgba(94,106,210,0.12);
      --gold:        #c8a84b;
      --gold-border: rgba(200,168,75,0.35);
      --card-bg:     #141412;
      --border:      rgba(255,255,255,0.08);
      --green:       #4ade80;
      --green-bg:    rgba(74,222,128,0.12);
      --green-border:rgba(74,222,128,0.3);
      --serif:       'Playfair Display', Georgia, serif;
      --sans:        'Inter', system-ui, sans-serif;
      --radius:      12px;
      --sidebar-w:   240px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body { font-family: var(--sans); background: var(--black); color: var(--white); min-height: 100vh; display: flex; }

    /* ── Sidebar ── */
    .sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--card-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; transition: transform 0.25s ease; }
    .menu-toggle { display: none; width: 36px; height: 36px; flex-shrink: 0; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 8px; color: var(--white); cursor: pointer; align-items: center; justify-content: center; }
    .sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 99; }
    .sidebar-backdrop.show { display: block; }
    .sidebar-logo { padding: 28px 24px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .logo-mark { width: 36px; height: 36px; background: var(--white); border: 1.5px solid var(--gold-border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-mark-text { font-family: var(--serif); font-size: 11px; font-weight: 700; color: var(--black); letter-spacing: -1px; }
    .logo-mark-text .bar { color: var(--gold); font-style: normal; }
    .logo-name { font-family: var(--serif); font-size: 14px; color: var(--white); line-height: 1.2; }
    .logo-name span { display: block; font-size: 10px; font-family: var(--sans); color: var(--muted); font-weight: 400; margin-top: 1px; letter-spacing: 0.5px; text-transform: uppercase; }
    .sidebar-nav { flex: 1; padding: 16px 0; }
    .nav-section-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 16px 24px 8px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 24px; color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.2s; font-size: 14px; font-weight: 500; border-left: 2px solid transparent; text-decoration: none; }
    .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.04); }
    .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-glow); }
    .sidebar-footer { border-top: 1px solid var(--border); padding: 20px 24px; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-deep)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--white); flex-shrink: 0; }
    .user-meta { flex: 1; min-width: 0; }
    .user-meta .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-meta .role { font-size: 11px; color: var(--accent); font-weight: 500; }
    .logout-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; border-radius: 4px; display: flex; align-items: center; }
    .logout-btn:hover { color: var(--white); background: rgba(255,255,255,0.08); }

    /* ── Main ── */
    .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { height: 64px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; position: sticky; top: 0; background: rgba(10,10,8,0.9); backdrop-filter: blur(12px); z-index: 50; }
    .topbar-title { font-size: 18px; font-weight: 600; }
    .badge-accent { background: var(--accent-glow); border: 1px solid var(--accent-border); color: var(--accent); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .page-body { padding: 28px 28px 60px; }

    /* ── Stat cards ── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .stat-card .value { font-family: var(--serif); font-size: 32px; font-weight: 700; line-height: 1; }
    .stat-card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .stat-card.accent .value { color: var(--accent); }
    .stat-card.gold   .value { color: var(--gold); }
    .stat-card.green  .value { color: var(--green); }

    /* ── Chart panels ── */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    .chart-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    .chart-panel h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .chart-panel .chart-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
    .chart-wrap { position: relative; height: 220px; }

    /* ── Topics panel ── */
    .topics-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    .topics-panel h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
    .topic-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .topic-name { font-size: 13px; min-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topic-bar-track { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
    .topic-bar-fill { height: 100%; border-radius: 99px; background: var(--accent); }
    .topic-priority { font-size: 11px; color: var(--muted); width: 60px; text-align: right; }

    .spinner { width: 28px; height: 28px; border: 3px solid rgba(94,106,210,0.25); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 60px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 900px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .charts-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 700px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .menu-toggle { display: flex; }
      .page-body { padding: 20px 16px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

  <!-- ═══ Sidebar ═══════════════════════════════════════════ -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark"><span class="logo-mark-text">F<i class="bar">|</i>A</span></div>
      <div class="logo-name">Father's Advice<span id="portal-label">Portal</span></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebar-avatar">JD</div>
        <div class="user-meta">
          <div class="name" id="sidebar-name">Jane Doe</div>
          <div class="role" id="sidebar-role">Mentee</div>
        </div>
        <button class="logout-btn" title="Sign out" onclick="signOut()">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ═══ Main ═══════════════════════════════════════════════ -->
  <main class="main">
    <header class="topbar">
      <div class="topbar-title" style="display:flex;align-items:center;gap:12px;">
        <button class="menu-toggle" id="menu-toggle" onclick="toggleSidebar()" aria-label="Open menu">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span>My Progress</span>
      </div>
      <span class="badge-accent" id="role-badge">Mentee</span>
    </header>

    <div class="page-body" id="page-body">
      <div class="spinner"></div>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const token = localStorage.getItem('fa_token');
    const role  = localStorage.getItem('fa_role');
    if (!token) window.location.href = '/login.html';

    const storedName = localStorage.getItem('fa_name') || 'User';
    document.getElementById('sidebar-name').textContent   = storedName;
    document.getElementById('sidebar-avatar').textContent =
      storedName.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
    document.getElementById('sidebar-role').textContent   = role === 'mentor' ? 'Mentor' : 'Mentee';
    document.getElementById('role-badge').textContent     = role === 'mentor' ? 'Mentor' : 'Mentee';
    document.getElementById('portal-label').textContent   = role === 'mentor' ? 'Mentor Portal' : 'Mentee Portal';

    // Inject role-appropriate sidebar nav
    const dashLink = role === 'mentor' ? 'dashboard-mentor.html' : 'dashboard-mentee.html';
    document.getElementById('sidebar-nav').innerHTML = role === 'mentor' ? `
      <div class="nav-section-label">Main</div>
      <a class="nav-item" href="${dashLink}"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>Dashboard</a>
      <a class="nav-item" href="find-mentee.html"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>Find a Mentee</a>
      <a class="nav-item" href="dashboard-mentor.html#requests"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>Mentee Requests</a>
      <a class="nav-item" href="calendar.html"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>My Sessions</a>
      <a class="nav-item" href="chat.html"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>Messages</a>
      <a class="nav-item active" href="progress.html"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>My Progress</a>
      <div class="nav-section-label" style="margin-top:8px;">Settings</div>
      <a class="nav-item" href="profile.html"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>My Profile</a>` : `
      <div class="nav-section-label">Main</div>
      <a class="nav-item" href="${dashLink}"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>Dashboard</a>
      <a class="nav-item" href="find-mentor.html"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>Find a Mentor</a>
      <a class="nav-item" href="calendar.html"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>My Sessions</a>
      <a class="nav-item" href="chat.html"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>Messages</a>
      <a class="nav-item active" href="progress.html"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>My Progress</a>
      <div class="nav-section-label" style="margin-top:8px;">Account</div>
      <a class="nav-item" href="profile.html"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>My Profile</a>`;

    function signOut() {
      localStorage.clear();
      window.location.href = '/login.html';
    }

    function toggleSidebar() {
      document.querySelector('.sidebar').classList.toggle('open');
      document.getElementById('sidebar-backdrop').classList.toggle('show');
    }
    function closeSidebar() {
      document.querySelector('.sidebar').classList.remove('open');
      document.getElementById('sidebar-backdrop').classList.remove('show');
    }

    async function load() {
      try {
        const [sessRes, meRes, connRes] = await Promise.all([
          fetch('/api/sessions/mine', { headers: { Authorization: `Bearer ${token}` } }),
          fetch('/api/auth/me',       { headers: { Authorization: `Bearer ${token}` } }),
          role === 'mentor'
            ? fetch('/api/connect/accepted', { headers: { Authorization: `Bearer ${token}` } })
            : Promise.resolve(null),
        ]);
        const { sessions } = await sessRes.json();
        const { profile }  = await meRes.json();
        const connData     = connRes ? await connRes.json() : null;
        if (role === 'mentor') {
          renderMentor(sessions || [], connData?.connections || []);
        } else {
          render(sessions || [], profile);
        }
      } catch (e) {
        document.getElementById('page-body').innerHTML =
          `<p style="color:var(--muted);padding:40px;">Could not load progress data.</p>`;
      }
    }

    function render(sessions, profile) {
      const completed  = sessions.filter(s => s.status === 'completed');
      const upcoming   = sessions.filter(s => s.status === 'confirmed' || s.status === 'proposed');
      const totalHours = completed.reduce((acc, s) => acc + (s.durationMins || 60), 0);
      const mentorIds  = new Set(sessions.map(s => s.mentor?._id || s.mentor).filter(Boolean));

      // Group completed sessions by month
      const monthMap = {};
      for (const s of sessions) {
        const d   = new Date(s.scheduledTime);
        const key = d.toLocaleDateString('en-US', { year: 'numeric', month: 'short' });
        if (!monthMap[key]) monthMap[key] = { attended: 0, scheduled: 0, ts: d.getTime() };
        if (s.status === 'completed') monthMap[key].attended++;
        else                          monthMap[key].scheduled++;
      }
      const sortedMonths = Object.entries(monthMap).sort((a, b) => a[1].ts - b[1].ts);
      const labels    = sortedMonths.map(([k]) => k);
      const attended  = sortedMonths.map(([, v]) => v.attended);
      const scheduled = sortedMonths.map(([, v]) => v.scheduled);

      // Cumulative completed sessions (learning curve)
      let cum = 0;
      const cumData = attended.map(v => (cum += v));

      // Topics from mentee profile
      const topics = (profile?.topics || []).sort((a, b) => a.priority - b.priority);

      document.getElementById('page-body').innerHTML = `
        <div class="stats-row">
          <div class="stat-card accent">
            <div class="label">Sessions Attended</div>
            <div class="value">${completed.length}</div>
            <div class="sub">of ${sessions.length} total</div>
          </div>
          <div class="stat-card gold">
            <div class="label">Hours of Learning</div>
            <div class="value">${Math.round(totalHours / 60)}</div>
            <div class="sub">${totalHours} minutes total</div>
          </div>
          <div class="stat-card green">
            <div class="label">Upcoming Sessions</div>
            <div class="value">${upcoming.length}</div>
            <div class="sub">confirmed or proposed</div>
          </div>
          <div class="stat-card" style="border-color:var(--gold-border);">
            <div class="label">Mentors Connected</div>
            <div class="value" style="color:var(--gold);">${mentorIds.size}</div>
            <div class="sub">unique mentors</div>
          </div>
        </div>

        <div class="charts-row">
          <div class="chart-panel">
            <h3>Sessions Per Month</h3>
            <div class="chart-sub">Attended vs upcoming by month</div>
            <div class="chart-wrap"><canvas id="bar-chart"></canvas></div>
          </div>
          <div class="chart-panel">
            <h3>Learning Progress</h3>
            <div class="chart-sub">Cumulative sessions completed over time</div>
            <div class="chart-wrap"><canvas id="line-chart"></canvas></div>
          </div>
        </div>

        <div class="topics-panel">
          <h3>Learning Topics Focus</h3>
          ${topics.length ? topics.map(t => {
            const pct   = t.priority === 1 ? 100 : t.priority === 2 ? 66 : 33;
            const label = t.priority === 1 ? 'High priority' : t.priority === 2 ? 'Mid priority' : 'Low priority';
            const color = t.priority === 1 ? 'var(--accent)' : t.priority === 2 ? 'var(--gold)' : 'var(--muted)';
            return `<div class="topic-row">
              <span class="topic-name">${String(t.name).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>
              <div class="topic-bar-track">
                <div class="topic-bar-fill" style="width:${pct}%;background:${color};"></div>
              </div>
              <span class="topic-priority">${label}</span>
            </div>`;
          }).join('') : '<p style="color:var(--muted);font-size:13px;">No learning topics added yet.</p>'}
        </div>
      `;

      drawCharts(labels, attended, scheduled, cumData);
    }

    function drawCharts(labels, attended, scheduled, cumData) {
      const gridColor  = 'rgba(255,255,255,0.06)';
      const labelColor = '#6b6b65';
      const noData     = labels.length === 0;

      // ── Bar chart ──
      new Chart(document.getElementById('bar-chart'), {
        type: 'bar',
        data: {
          labels: noData ? ['No data yet'] : labels,
          datasets: [
            {
              label:           'Attended',
              data:            noData ? [0] : attended,
              backgroundColor: 'rgba(94,106,210,0.75)',
              borderRadius:    4,
            },
            {
              label:           'Upcoming',
              data:            noData ? [0] : scheduled,
              backgroundColor: 'rgba(74,222,128,0.55)',
              borderRadius:    4,
            },
          ],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: labelColor, font: { size: 11 } } } },
          scales: {
            x: { ticks: { color: labelColor, font: { size: 10 } }, grid: { color: gridColor } },
            y: { ticks: { color: labelColor, font: { size: 10 }, stepSize: 1 }, grid: { color: gridColor }, beginAtZero: true },
          },
        },
      });

      // ── Line chart ──
      new Chart(document.getElementById('line-chart'), {
        type: 'line',
        data: {
          labels: noData ? ['Start'] : labels,
          datasets: [{
            label:           'Sessions Completed',
            data:            noData ? [0] : cumData,
            borderColor:     '#c8a84b',
            backgroundColor: 'rgba(200,168,75,0.12)',
            borderWidth:     2,
            pointBackgroundColor: '#c8a84b',
            pointRadius:     4,
            fill:            true,
            tension:         0.3,
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: labelColor, font: { size: 11 } } } },
          scales: {
            x: { ticks: { color: labelColor, font: { size: 10 } }, grid: { color: gridColor } },
            y: { ticks: { color: labelColor, font: { size: 10 }, stepSize: 1 }, grid: { color: gridColor }, beginAtZero: true },
          },
        },
      });
    }

    /* ────────────────────────────────────────────────────────
       MENTOR PROGRESS VIEW
    ──────────────────────────────────────────────────────── */
    function renderMentor(sessions, connections) {
      const completed   = sessions.filter(s => s.status === 'completed');
      const upcoming    = sessions.filter(s => s.status === 'confirmed' || s.status === 'proposed');
      const totalMins   = completed.reduce((acc, s) => acc + (s.durationMins || 60), 0);
      const totalHours  = Math.round(totalMins / 60 * 10) / 10;
      const activeMent  = connections.length;

      // Mentor Score = based on completed sessions + hours + active mentees
      // Formula: (min(completedSessions/20,1)*50 + min(totalHours/50,1)*30 + min(activeMentees/5,1)*20)
      const sessScore  = Math.min(completed.length / 20, 1) * 50;
      const hourScore  = Math.min(totalHours / 50, 1) * 30;
      const mentScore  = Math.min(activeMent / 5, 1) * 20;
      const mentorScore = Math.round(sessScore + hourScore + mentScore);

      // Estimated salary: ₹2,500 per session + ₹5,000 per active mentee
      const salary = completed.length * 2500 + activeMent * 5000;
      const salaryStr = salary >= 100000
        ? `₹${(salary/100000).toFixed(1)}L`
        : salary >= 1000 ? `₹${(salary/1000).toFixed(1)}K`
        : `₹${salary}`;

      // Group sessions by month
      const monthMap = {};
      for (const s of sessions) {
        const d   = new Date(s.scheduledTime);
        const key = d.toLocaleDateString('en-US', { year: 'numeric', month: 'short' });
        if (!monthMap[key]) monthMap[key] = { done: 0, upcoming: 0, ts: d.getTime(), hours: 0 };
        if (s.status === 'completed') { monthMap[key].done++; monthMap[key].hours += (s.durationMins || 60) / 60; }
        else monthMap[key].upcoming++;
      }
      const sortedMonths = Object.entries(monthMap).sort((a, b) => a[1].ts - b[1].ts);
      const labels    = sortedMonths.map(([k]) => k);
      const doneArr   = sortedMonths.map(([, v]) => v.done);
      const upcomArr  = sortedMonths.map(([, v]) => v.upcoming);

      // Cumulative earnings per month
      let cumEarnings = 0;
      const earningsArr = sortedMonths.map(([, v]) => {
        cumEarnings += v.done * 2500 + Math.round(v.hours) * 500;
        return cumEarnings;
      });

      // Score colour
      const scoreColor = mentorScore >= 75 ? 'var(--green)' : mentorScore >= 50 ? 'var(--gold)' : 'var(--muted)';

      document.getElementById('page-body').innerHTML = `
        <div class="stats-row">
          <div class="stat-card green">
            <div class="label">Sessions Completed</div>
            <div class="value">${completed.length}</div>
            <div class="sub">of ${sessions.length} total</div>
          </div>
          <div class="stat-card gold">
            <div class="label">Hours Mentored</div>
            <div class="value">${totalHours}</div>
            <div class="sub">${totalMins} minutes total</div>
          </div>
          <div class="stat-card accent">
            <div class="label">Active Mentees</div>
            <div class="value">${activeMent}</div>
            <div class="sub">${upcoming.length} upcoming sessions</div>
          </div>
          <div class="stat-card" style="border-color:var(--gold-border);">
            <div class="label">Mentor Score</div>
            <div class="value" style="color:${scoreColor};">${mentorScore}</div>
            <div class="sub">out of 100</div>
          </div>
        </div>

        <div class="charts-row">
          <div class="chart-panel">
            <h3>Sessions Per Month</h3>
            <div class="chart-sub">Completed vs upcoming by month</div>
            <div class="chart-wrap"><canvas id="bar-chart"></canvas></div>
          </div>
          <div class="chart-panel">
            <h3>Cumulative Earnings</h3>
            <div class="chart-sub">Estimated salary over time (₹2,500/session + ₹500/hr)</div>
            <div class="chart-wrap"><canvas id="line-chart"></canvas></div>
          </div>
        </div>

        <div class="topics-panel">
          <h3>Earnings & Score Breakdown</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px;">
            <div>
              <div style="font-size:12px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px;">Score Components</div>
              <div class="topic-row">
                <span class="topic-name">Sessions (${completed.length}/20)</span>
                <div class="topic-bar-track"><div class="topic-bar-fill" style="width:${Math.min(100, completed.length/20*100)}%;background:var(--green);"></div></div>
                <span class="topic-priority">${Math.round(sessScore)}/50</span>
              </div>
              <div class="topic-row">
                <span class="topic-name">Hours (${totalHours}/50h)</span>
                <div class="topic-bar-track"><div class="topic-bar-fill" style="width:${Math.min(100, totalHours/50*100)}%;background:var(--gold);"></div></div>
                <span class="topic-priority">${Math.round(hourScore)}/30</span>
              </div>
              <div class="topic-row">
                <span class="topic-name">Mentees (${activeMent}/5)</span>
                <div class="topic-bar-track"><div class="topic-bar-fill" style="width:${Math.min(100, activeMent/5*100)}%;background:var(--accent);"></div></div>
                <span class="topic-priority">${Math.round(mentScore)}/20</span>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px;padding:20px;background:rgba(200,168,75,0.06);border:1px solid var(--gold-border);border-radius:var(--radius);">
              <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;">Estimated Earnings</div>
              <div style="font-family:var(--serif);font-size:36px;font-weight:700;color:var(--gold);">${salaryStr}</div>
              <div style="font-size:12px;color:var(--muted);text-align:center;">Based on ${completed.length} sessions<br>& ${activeMent} active mentees</div>
            </div>
          </div>
        </div>
      `;

      drawMentorCharts(labels, doneArr, upcomArr, earningsArr);
    }

    function drawMentorCharts(labels, done, upcoming, earnings) {
      const gridColor  = 'rgba(255,255,255,0.06)';
      const labelColor = '#6b6b65';
      const noData     = labels.length === 0;

      new Chart(document.getElementById('bar-chart'), {
        type: 'bar',
        data: {
          labels: noData ? ['No data yet'] : labels,
          datasets: [
            { label: 'Completed', data: noData ? [0] : done, backgroundColor: 'rgba(74,222,128,0.75)', borderRadius: 4 },
            { label: 'Upcoming',  data: noData ? [0] : upcoming, backgroundColor: 'rgba(200,168,75,0.55)', borderRadius: 4 },
          ],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: labelColor, font: { size: 11 } } } },
          scales: {
            x: { ticks: { color: labelColor, font: { size: 10 } }, grid: { color: gridColor } },
            y: { ticks: { color: labelColor, font: { size: 10 }, stepSize: 1 }, grid: { color: gridColor }, beginAtZero: true },
          },
        },
      });

      new Chart(document.getElementById('line-chart'), {
        type: 'line',
        data: {
          labels: noData ? ['Start'] : labels,
          datasets: [{
            label: 'Earnings (₹)',
            data: noData ? [0] : earnings,
            borderColor: '#c8a84b',
            backgroundColor: 'rgba(200,168,75,0.12)',
            borderWidth: 2,
            pointBackgroundColor: '#c8a84b',
            pointRadius: 4,
            fill: true,
            tension: 0.3,
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: labelColor, font: { size: 11 } } } },
          scales: {
            x: { ticks: { color: labelColor, font: { size: 10 } }, grid: { color: gridColor } },
            y: { ticks: { color: labelColor, font: { size: 10 }, callback: v => v >= 1000 ? `₹${v/1000}K` : `₹${v}` }, grid: { color: gridColor }, beginAtZero: true },
          },
        },
      });
    }

    load();
  </script>
</body>
</html>
