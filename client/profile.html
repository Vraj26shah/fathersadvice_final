<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — Father's Advice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black:       #0a0a08;
      --white:       #ffffff;
      --muted:       #6b6b65;
      --accent:      #5e6ad2;
      --accent-deep: #4a54b8;
      --accent-border: rgba(94,106,210,0.35);
      --accent-glow:   rgba(94,106,210,0.12);
      --gold:        #c8a84b;
      --gold-border: rgba(200,168,75,0.35);
      --card-bg:     #141412;
      --border:      rgba(255,255,255,0.08);
      --green:       #4ade80;
      --serif:       'Playfair Display', Georgia, serif;
      --sans:        'Inter', system-ui, sans-serif;
      --radius:      12px;
      --sidebar-w:   240px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body { font-family: var(--sans); background: var(--black); color: var(--white); min-height: 100vh; display: flex; }

    /* ── Sidebar ── */
    .sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--card-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; }
    .sidebar-logo { padding: 28px 24px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .logo-mark { width: 36px; height: 36px; background: var(--white); border: 1.5px solid var(--gold-border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-mark-text { font-family: var(--serif); font-size: 11px; font-weight: 700; color: var(--black); letter-spacing: -1px; }
    .logo-mark-text .bar { color: var(--gold); font-style: normal; }
    .logo-name { font-family: var(--serif); font-size: 14px; color: var(--white); line-height: 1.2; }
    .logo-name span { display: block; font-size: 10px; font-family: var(--sans); color: var(--muted); font-weight: 400; margin-top: 1px; letter-spacing: 0.5px; text-transform: uppercase; }
    .sidebar-nav { flex: 1; padding: 16px 0; }
    .nav-section-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 16px 24px 8px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 24px; color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.2s; font-size: 14px; font-weight: 500; border-left: 2px solid transparent; text-decoration: none; }
    .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.04); }
    .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-glow); }
    .sidebar-footer { border-top: 1px solid var(--border); padding: 16px 20px; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-avatar-sm { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .user-meta { flex: 1; min-width: 0; }
    .user-meta .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-meta .role { font-size: 11px; color: var(--muted); }
    .logout-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; border-radius: 4px; display: flex; align-items: center; }
    .logout-btn:hover { color: var(--white); background: rgba(255,255,255,0.08); }

    /* ── Main ── */
    .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; position: sticky; top: 0; background: rgba(10,10,8,0.9); backdrop-filter: blur(12px); z-index: 50; }
    .topbar-title { font-size: 15px; font-weight: 600; }
    .badge-accent { background: var(--accent-glow); border: 1px solid var(--accent-border); color: var(--accent); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .page-body { padding: 28px 28px 60px; max-width: 860px; }

    /* ── Profile header ── */
    .profile-header { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; display: flex; gap: 24px; align-items: center; margin-bottom: 24px; }
    .avatar-circle { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 24px; font-weight: 700; flex-shrink: 0; background: linear-gradient(135deg,#5e6ad2,#4a54b8); }
    .avatar-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .header-info { flex: 1; }
    .header-name { font-family: var(--serif); font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .header-email { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .header-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .tag.role  { background: var(--accent-glow); border: 1px solid var(--accent-border); color: var(--accent); }
    .tag.domain{ background: rgba(200,168,75,0.1); border: 1px solid var(--gold-border); color: var(--gold); }
    .tag.exp   { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: rgba(255,255,255,0.6); }

    /* ── Sections ── */
    .section { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
    .section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 16px; }
    .field-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field.full { grid-column: 1 / -1; }
    .field-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .field-value { font-size: 14px; color: var(--white); line-height: 1.5; }
    .field-value.empty { color: var(--muted); font-style: italic; }

    /* ── Skills / Topics ── */
    .skill-list { display: flex; flex-direction: column; gap: 10px; }
    .skill-row { display: flex; align-items: center; gap: 12px; }
    .skill-name { font-size: 13px; min-width: 160px; }
    .skill-bar-track { flex: 1; height: 5px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
    .skill-bar-fill { height: 100%; border-radius: 99px; background: var(--accent); }
    .skill-meta { font-size: 11px; color: var(--muted); width: 70px; text-align: right; white-space: nowrap; }

    .topic-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 20px; margin: 3px; }
    .topic-chip.p1 { background: var(--accent-glow); border: 1px solid var(--accent-border); color: var(--accent); }
    .topic-chip.p2 { background: rgba(200,168,75,0.1); border: 1px solid var(--gold-border); color: var(--gold); }
    .topic-chip.p3 { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--muted); }

    /* ── Slots ── */
    .slots-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .slot-chip { font-size: 12px; padding: 5px 12px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: rgba(255,255,255,0.75); }

    /* ── Language chips ── */
    .lang-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .lang-chip { font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 20px; background: rgba(200,168,75,0.1); border: 1px solid var(--gold-border); color: var(--gold); }

    .spinner { width: 28px; height: 28px; border: 3px solid rgba(94,106,210,0.25); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 60px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 700px) {
      :root { --sidebar-w: 0px; }
      .sidebar { transform: translateX(-100%); }
      .main { margin-left: 0; }
      .page-body { padding: 20px 16px; }
      .field-grid { grid-template-columns: 1fr; }
      .profile-header { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- ═══ Sidebar ═══════════════════════════════════════════ -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark"><span class="logo-mark-text">F<i class="bar">|</i>A</span></div>
      <div class="logo-name">Father's Advice<span>My Portal</span></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar-sm" id="sidebar-avatar">JD</div>
        <div class="user-meta">
          <div class="name" id="sidebar-name">Jane Doe</div>
          <div class="role" id="sidebar-role">Mentee</div>
        </div>
        <button class="logout-btn" title="Sign out" onclick="signOut()">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ═══ Main ═══════════════════════════════════════════════ -->
  <main class="main">
    <header class="topbar">
      <div class="topbar-title">My Profile</div>
      <span class="badge-accent" id="role-badge">Mentee</span>
    </header>

    <div class="page-body" id="page-body">
      <div class="spinner"></div>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const token = localStorage.getItem('fa_token');
    if (!token) window.location.href = '/login.html';

    const storedName = localStorage.getItem('fa_name') || '';
    document.getElementById('sidebar-name').textContent   = storedName;
    document.getElementById('sidebar-avatar').textContent =
      storedName.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();

    function signOut() { localStorage.clear(); window.location.href = '/login.html'; }

    function val(v, fallback = '—') {
      return (v && String(v).trim()) ? v : fallback;
    }
    function emptyClass(v) {
      return (v && String(v).trim()) ? '' : ' empty';
    }

    async function load() {
      try {
        const res  = await fetch('/api/auth/me', { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();
        render(data.user, data.profile);
      } catch (e) {
        document.getElementById('page-body').innerHTML =
          `<p style="color:var(--muted);padding:40px;">Could not load profile.</p>`;
      }
    }

    function render(user, profile) {
      const role   = user.role;
      const initials = user.fullName.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();

      // Update sidebar + badge
      document.getElementById('sidebar-role').textContent = role === 'mentor' ? 'Mentor' : 'Mentee';
      document.getElementById('role-badge').textContent   = role === 'mentor' ? 'Mentor' : 'Mentee';

      // Inject role-appropriate sidebar nav
      const dashLink = role === 'mentor' ? 'dashboard-mentor.html' : 'dashboard-mentee.html';
      document.getElementById('sidebar-nav').innerHTML = role === 'mentor' ? `
        <div class="nav-section-label">Main</div>
        <a class="nav-item" href="${dashLink}"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>Dashboard</a>
        <a class="nav-item" href="find-mentee.html"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>Find a Mentee</a>
        <a class="nav-item" href="dashboard-mentor.html#requests"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>Mentee Requests</a>
        <a class="nav-item" href="calendar.html"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>My Sessions</a>
        <a class="nav-item" href="chat.html"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>Messages</a>
        <a class="nav-item" href="progress.html"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>My Progress</a>
        <div class="nav-section-label" style="margin-top:8px;">Settings</div>
        <a class="nav-item active" href="profile.html"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>My Profile</a>
        <a class="nav-item" href="profile.html"><span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg></span>Availability</a>` : `
        <div class="nav-section-label">Main</div>
        <a class="nav-item" href="${dashLink}">
          <span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>
          Dashboard
        </a>
        <a class="nav-item" href="find-mentor.html">
          <span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          Find a Mentor
        </a>
        <a class="nav-item" href="calendar.html">
          <span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
          My Sessions
        </a>
        <a class="nav-item" href="chat.html">
          <span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
          Messages
        </a>
        <a class="nav-item" href="progress.html">
          <span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
          My Progress
        </a>
        <div class="nav-section-label" style="margin-top:8px;">Account</div>
        <a class="nav-item active" href="profile.html">
          <span><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          My Profile
        </a>`;

      // Avatar
      let avatarHtml = `<span>${initials}</span>`;
      if (user.profilePicture) {
        avatarHtml = `<img src="${user.profilePicture}" alt="${user.fullName}" />`;
      }

      // Header tags
      const domain = profile?.domain || '';
      const exp    = role === 'mentee' ? profile?.expLevel : profile?.yearsExperience ? `${profile.yearsExperience} yrs exp` : '';

      let sectionsHtml = '';

      if (role === 'mentee') {
        sectionsHtml = renderMentee(profile);
      } else {
        sectionsHtml = renderMentor(profile);
      }

      document.getElementById('page-body').innerHTML = `
        <div class="profile-header">
          <div class="avatar-circle">${avatarHtml}</div>
          <div class="header-info">
            <div class="header-name">${user.fullName}</div>
            <div class="header-email">${user.email}</div>
            <div class="header-tags">
              <span class="tag role">${role === 'mentor' ? 'Mentor' : 'Mentee'}</span>
              ${domain ? `<span class="tag domain">${domain}</span>` : ''}
              ${exp    ? `<span class="tag exp">${exp}</span>` : ''}
            </div>
          </div>
        </div>
        ${sectionsHtml}
      `;
    }

    function renderMentee(p) {
      if (!p) return '<p style="color:var(--muted);padding:16px;">No profile data found.</p>';

      const topics     = p.topics || [];
      const slots      = p.slots  || [];
      const languages  = p.languages || [];

      const topicChips = topics.length
        ? topics.map(t => `<span class="topic-chip p${t.priority}">${t.name}</span>`).join('')
        : '<span style="color:var(--muted);font-size:13px;">None added</span>';

      const slotChips = slots.length
        ? slots.map(s => `<span class="slot-chip">${s.day} ${s.start}–${s.end}</span>`).join('')
        : '<span style="color:var(--muted);font-size:13px;">No slots added</span>';

      const langChips = languages.length
        ? languages.map(l => `<span class="lang-chip">${l}</span>`).join('')
        : '<span style="color:var(--muted);font-size:13px;">Not specified</span>';

      return `
        <div class="section">
          <div class="section-title">Background</div>
          <div class="field-grid">
            <div class="field"><span class="field-label">Role / Status</span><span class="field-value${emptyClass(p.roleStatus)}">${val(p.roleStatus)}</span></div>
            <div class="field"><span class="field-label">Organisation</span><span class="field-value${emptyClass(p.organisation)}">${val(p.organisation)}</span></div>
            <div class="field"><span class="field-label">Experience Level</span><span class="field-value${emptyClass(p.expLevel)}">${val(p.expLevel)}</span></div>
            <div class="field"><span class="field-label">Domain</span><span class="field-value${emptyClass(p.domain)}">${val(p.domain)}</span></div>
            <div class="field full"><span class="field-label">Bio</span><span class="field-value${emptyClass(p.bio)}">${val(p.bio)}</span></div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Learning Goals</div>
          <div class="field-grid">
            <div class="field full">
              <span class="field-label">Topics (colour = priority: blue high · gold mid · grey low)</span>
              <div style="margin-top:8px;">${topicChips}</div>
            </div>
            <div class="field full"><span class="field-label">Learning Description</span><span class="field-value${emptyClass(p.learningDescription)}">${val(p.learningDescription)}</span></div>
            <div class="field full"><span class="field-label">Desired Outcome</span><span class="field-value${emptyClass(p.desiredOutcome)}">${val(p.desiredOutcome)}</span></div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Availability & Preferences</div>
          <div class="field-grid">
            <div class="field"><span class="field-label">Session Format</span><span class="field-value${emptyClass(p.sessionFormat)}">${val(p.sessionFormat)}</span></div>
            <div class="field"><span class="field-label">Session Length</span><span class="field-value${emptyClass(p.sessionLength)}">${p.sessionLength ? p.sessionLength + ' min' : '—'}</span></div>
            <div class="field"><span class="field-label">Required Hours / Week</span><span class="field-value${emptyClass(p.requiredHours)}">${val(p.requiredHours)}</span></div>
            <div class="field"><span class="field-label">Timezone</span><span class="field-value${emptyClass(p.timezone)}">${val(p.timezone)}</span></div>
            <div class="field full">
              <span class="field-label">Available Slots</span>
              <div class="slots-grid" style="margin-top:8px;">${slotChips}</div>
            </div>
            <div class="field full">
              <span class="field-label">Preferred Languages</span>
              <div class="lang-chips" style="margin-top:8px;">${langChips}</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderMentor(p) {
      if (!p) return '<p style="color:var(--muted);padding:16px;">No profile data found.</p>';

      const skills    = p.skills    || [];
      const slots     = p.slots     || [];
      const languages = p.languages || [];

      const skillRows = skills.length ? `
        <div class="skill-list">
          ${skills.map(s => {
            const pct = Math.round(((s.proficiency || 3) / 5) * 100);
            return `<div class="skill-row">
              <span class="skill-name">${s.name}</span>
              <div class="skill-bar-track"><div class="skill-bar-fill" style="width:${pct}%;"></div></div>
              <span class="skill-meta">Level ${s.proficiency || 3}/5${s.years ? ' · ' + s.years + ' yrs' : ''}</span>
            </div>`;
          }).join('')}
        </div>` : '<span style="color:var(--muted);font-size:13px;">No skills added</span>';

      const slotChips = slots.length
        ? slots.map(s => `<span class="slot-chip">${s.day} ${s.start}–${s.end}</span>`).join('')
        : '<span style="color:var(--muted);font-size:13px;">No slots added</span>';

      const langChips = languages.length
        ? languages.map(l => `<span class="lang-chip">${l}</span>`).join('')
        : '<span style="color:var(--muted);font-size:13px;">Not specified</span>';

      return `
        <div class="section">
          <div class="section-title">Professional Details</div>
          <div class="field-grid">
            <div class="field"><span class="field-label">Job Title</span><span class="field-value${emptyClass(p.jobTitle)}">${val(p.jobTitle)}</span></div>
            <div class="field"><span class="field-label">Organisation</span><span class="field-value${emptyClass(p.organisation)}">${val(p.organisation)}</span></div>
            <div class="field"><span class="field-label">Years of Experience</span><span class="field-value${emptyClass(p.yearsExperience)}">${val(p.yearsExperience)}</span></div>
            <div class="field"><span class="field-label">Domain</span><span class="field-value${emptyClass(p.domain)}">${val(p.domain)}</span></div>
            <div class="field full"><span class="field-label">Bio</span><span class="field-value${emptyClass(p.bio)}">${val(p.bio)}</span></div>
            ${p.linkedinUrl ? `<div class="field full"><span class="field-label">LinkedIn</span><a href="${p.linkedinUrl}" target="_blank" style="font-size:14px;color:var(--accent);">${p.linkedinUrl}</a></div>` : ''}
          </div>
        </div>

        <div class="section">
          <div class="section-title">Skills & Expertise</div>
          <div class="field-grid">
            <div class="field full" style="margin-bottom:16px;">${skillRows}</div>
            <div class="field full"><span class="field-label">Expertise Description</span><span class="field-value${emptyClass(p.expertiseDescription)}">${val(p.expertiseDescription)}</span></div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Availability & Preferences</div>
          <div class="field-grid">
            <div class="field"><span class="field-label">Max Mentees</span><span class="field-value">${p.maxMentees || '—'}</span></div>
            <div class="field"><span class="field-label">Session Length</span><span class="field-value">${p.sessionLength ? p.sessionLength + ' min' : '—'}</span></div>
            <div class="field"><span class="field-label">Hours / Week</span><span class="field-value${emptyClass(p.totalHours)}">${val(p.totalHours)}</span></div>
            <div class="field"><span class="field-label">Timezone</span><span class="field-value${emptyClass(p.timezone)}">${val(p.timezone)}</span></div>
            <div class="field full">
              <span class="field-label">Available Slots</span>
              <div class="slots-grid" style="margin-top:8px;">${slotChips}</div>
            </div>
            <div class="field full">
              <span class="field-label">Teaching Languages</span>
              <div class="lang-chips" style="margin-top:8px;">${langChips}</div>
            </div>
          </div>
        </div>
      `;
    }

    load();
  </script>
</body>
</html>
