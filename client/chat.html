<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — Father's Advice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black:       #0a0a08;
      --cream:       #f5f2eb;
      --white:       #ffffff;
      --muted:       #6b6b65;
      --accent:      #5e6ad2;
      --accent-deep: #4a54b8;
      --accent-border: rgba(94,106,210,0.35);
      --accent-glow:   rgba(94,106,210,0.12);
      --gold:        #c8a84b;
      --gold-deep:   #a8882b;
      --gold-border: rgba(200,168,75,0.35);
      --gold-glow:   rgba(200,168,75,0.15);
      --card-bg:     #141412;
      --card2:       #1a1a17;
      --border:      rgba(255,255,255,0.08);
      --serif:       'Playfair Display', Georgia, serif;
      --sans:        'Inter', system-ui, sans-serif;
      --radius:      12px;
      --sidebar-w:   240px;
      --conv-w:      300px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--sans);
      background: var(--black);
      color: var(--white);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Sidebar ──────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--card-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
    }
    .sidebar-logo {
      padding: 28px 24px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .logo-mark {
      width: 36px; height: 36px;
      background: var(--white);
      border: 1.5px solid var(--gold-border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-mark-text { font-family: var(--serif); font-size: 11px; font-weight: 700; color: var(--black); letter-spacing: -1px; }
    .logo-mark-text .bar { color: var(--gold-deep); }
    .logo-name { font-family: var(--serif); font-size: 14px; font-weight: 700; color: var(--white); line-height: 1.2; }
    .logo-name span { display: block; font-family: var(--sans); font-size: 10px; font-weight: 400; color: var(--muted); letter-spacing: 0.5px; margin-top: 1px; }
    .sidebar-nav { flex: 1; padding: 16px 0; overflow-y: auto; }
    .nav-section-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; padding: 8px 24px 4px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 24px; color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.2s; font-size: 14px; font-weight: 500; border-left: 2px solid transparent; text-decoration: none; }
    .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.04); }
    .nav-item.active { color: var(--gold); border-left-color: var(--gold); background: var(--gold-glow); }
    .nav-item .icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold); color: var(--black); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .user-meta .name { font-size: 13px; font-weight: 600; color: var(--white); }
    .user-meta .role { font-size: 11px; color: var(--muted); }
    .logout-btn { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; border-radius: 6px; }
    .logout-btn:hover { color: var(--white); background: rgba(255,255,255,0.06); }

    /* ─── Main layout ──────────────────────────────────── */
    .main-wrap {
      margin-left: var(--sidebar-w);
      display: flex;
      flex: 1;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Conversations panel ──────────────────────────── */
    .conv-panel {
      width: var(--conv-w);
      background: var(--card-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .conv-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .conv-header h2 { font-family: var(--serif); font-size: 20px; color: var(--white); }
    .conv-header p  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .conv-list { flex: 1; overflow-y: auto; }
    .conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .conv-item:hover { background: rgba(255,255,255,0.03); }
    .conv-item.selected { background: rgba(200,168,75,0.08); border-left: 2px solid var(--gold); }
    .conv-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--white);
      font-size: 14px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      position: relative;
    }
    .conv-avatar.mentor-av { background: var(--gold); color: var(--black); }
    .online-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #4ade80;
      border: 2px solid var(--card-bg);
      position: absolute; bottom: 0; right: 0;
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name { font-size: 14px; font-weight: 600; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .conv-time { font-size: 11px; color: var(--muted); }
    .conv-badge {
      background: var(--gold);
      color: var(--black);
      font-size: 10px; font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }
    .conv-empty { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 13px; }

    /* ─── Chat window ──────────────────────────────────── */
    .chat-window {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--black);
      overflow: hidden;
    }
    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card-bg);
      flex-shrink: 0;
    }
    .chat-header-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--white);
      font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chat-header-avatar.mentor-av { background: var(--gold); color: var(--black); }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-size: 15px; font-weight: 600; color: var(--white); }
    .chat-header-sub  { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .chat-header-actions { display: flex; gap: 8px; }
    .btn-schedule {
      background: var(--gold);
      color: var(--black);
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: background 0.2s;
    }
    .btn-schedule:hover { background: var(--gold-deep); }
    .btn-session {
      background: rgba(74,222,128,0.12);
      color: #4ade80;
      border: 1px solid rgba(74,222,128,0.3);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn-session:hover { background: rgba(74,222,128,0.2); }

    /* ─── Messages area ─────────────────────────────────── */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .msg-group { margin-bottom: 12px; }
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-bottom: 2px;
    }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-sender-av {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--white);
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .msg-sender-av.mentor-av { background: var(--gold); color: var(--black); }
    .msg-sender-av.mine-av   { background: var(--accent-deep); }
    .msg-bubble {
      max-width: 480px;
      padding: 9px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      background: var(--card2);
      color: var(--white);
      border: 1px solid var(--border);
    }
    .msg-row.mine .msg-bubble {
      background: var(--accent);
      border-color: transparent;
    }
    .msg-meta {
      font-size: 10px;
      color: var(--muted);
      padding: 0 4px;
      text-align: right;
    }
    .msg-row.mine .msg-meta { text-align: left; }
    .date-divider {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin: 16px 0 8px;
      position: relative;
    }
    .date-divider::before, .date-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 35%;
      height: 1px;
      background: var(--border);
    }
    .date-divider::before { left: 0; }
    .date-divider::after  { right: 0; }
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
    }
    .typing-indicator.visible { display: flex; }
    .typing-dots span {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
      margin: 0 1px;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-5px); }
    }
    .load-more-btn {
      align-self: center;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 6px 18px;
      font-size: 12px;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .load-more-btn:hover { color: var(--white); border-color: rgba(255,255,255,0.2); }
    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 8px;
    }
    .chat-empty svg { opacity: 0.2; }
    .chat-empty p   { font-size: 14px; }

    /* ─── Input bar ─────────────────────────────────────── */
    .input-bar {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--card-bg);
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }
    .input-wrap {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: flex-end;
      padding: 4px 4px 4px 14px;
      gap: 8px;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: rgba(94,106,210,0.5); }
    #msg-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--white);
      font-size: 14px;
      font-family: var(--sans);
      resize: none;
      min-height: 36px;
      max-height: 120px;
      padding: 8px 0;
      line-height: 1.5;
    }
    #msg-input::placeholder { color: var(--muted); }
    .send-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--accent);
      border: none;
      color: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .send-btn:hover  { background: var(--accent-deep); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── No conversation selected ──────────────────────── */
    .no-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 10px;
    }
    .no-chat svg { opacity: 0.15; }
    .no-chat p   { font-size: 15px; }
    .no-chat small { font-size: 12px; }

    /* ─── Spinner ───────────────────────────────────────── */
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 30px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Schedule modal ────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 30px;
      width: 380px;
      max-width: 95vw;
    }
    .modal h3 { font-family: var(--serif); font-size: 18px; margin-bottom: 18px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--white);
      font-size: 13px;
      font-family: var(--sans);
      outline: none;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--gold-border); }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-modal-cancel { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: var(--white); font-size: 13px; cursor: pointer; }
    .btn-modal-submit { flex: 1; background: var(--gold); border: none; border-radius: 8px; padding: 10px; color: var(--black); font-size: 13px; font-weight: 700; cursor: pointer; }
    #sched-error { font-size: 12px; color: #f87171; margin-top: 8px; display: none; }
  </style>
</head>
<body>

  <!-- ─── Nav Sidebar ──────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark"><span class="logo-mark-text">F<i class="bar">|</i>A</span></div>
      <div class="logo-name">Father's Advice<span id="portal-label">Portal</span></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- injected by JS -->
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebar-avatar">?</div>
        <div class="user-meta">
          <div class="name" id="sidebar-name">Loading…</div>
          <div class="role" id="sidebar-role"></div>
        </div>
        <button class="logout-btn" title="Sign out" onclick="signOut()">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ─── Main ─────────────────────────────────────────── -->
  <div class="main-wrap">

    <!-- Conversations list -->
    <div class="conv-panel">
      <div class="conv-header">
        <h2>Messages</h2>
        <p id="conv-sub">Your accepted connections</p>
      </div>
      <div class="conv-list" id="conv-list">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Chat window (hidden until a conversation is selected) -->
    <div class="chat-window" id="chat-window">
      <div class="no-chat" id="no-chat">
        <svg width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <p>Select a conversation</p>
        <small>Choose someone from the list to start chatting</small>
      </div>

      <!-- Header (hidden until selected) -->
      <div class="chat-header" id="chat-header" style="display:none;">
        <div class="chat-header-avatar" id="ch-avatar">?</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="ch-name">—</div>
          <div class="chat-header-sub"  id="ch-sub">—</div>
        </div>
        <div class="chat-header-actions">
          <button class="btn-schedule" onclick="openScheduleModal()" id="btn-sched">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Schedule Session
          </button>
          <a class="btn-session" id="btn-join-session" href="#" style="display:none;">
            <div style="width:7px;height:7px;border-radius:50%;background:#4ade80;animation:blink 1s infinite;"></div>
            Join Session
          </a>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages-area" id="messages-area" style="display:none;">
        <!-- filled by JS -->
      </div>
      <div class="typing-indicator" id="typing-indicator">
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <span id="typing-name"></span> is typing…
      </div>

      <!-- Input -->
      <div class="input-bar" id="input-bar" style="display:none;">
        <div class="input-wrap">
          <textarea id="msg-input" rows="1" placeholder="Type a message…"></textarea>
        </div>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ─── Schedule Session Modal ──────────────────────── -->
  <div class="modal-overlay" id="sched-modal">
    <div class="modal">
      <h3>Schedule a Session</h3>
      <div class="form-group">
        <label>Date & Time</label>
        <input type="datetime-local" id="sched-time" />
      </div>
      <div class="form-group">
        <label>Duration</label>
        <select id="sched-duration">
          <option value="30">30 minutes</option>
          <option value="60" selected>1 hour</option>
          <option value="90">1.5 hours</option>
          <option value="120">2 hours</option>
        </select>
      </div>
      <div class="form-group">
        <label>Notes (optional)</label>
        <textarea id="sched-notes" rows="2" placeholder="What do you want to cover?"></textarea>
      </div>
      <div id="sched-error"></div>
      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closeScheduleModal()">Cancel</button>
        <button class="btn-modal-submit" onclick="proposeSession()">Send Proposal</button>
      </div>
    </div>
  </div>

  <style>
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    /* ── Auth guard ───────────────────────────────────────── */
    const token = localStorage.getItem('fa_token');
    const role  = localStorage.getItem('fa_role');
    const myId  = localStorage.getItem('fa_id');
    const myName = localStorage.getItem('fa_name') || 'You';
    if (!token) { location.href = 'login.html'; }

    /* ── Sidebar ──────────────────────────────────────────── */
    const dashLink = role === 'mentor' ? 'dashboard-mentor.html' : 'dashboard-mentee.html';
    const initials = myName.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
    document.getElementById('sidebar-avatar').textContent = initials;
    document.getElementById('sidebar-name').textContent   = myName;
    document.getElementById('sidebar-role').textContent   = role ? role.charAt(0).toUpperCase() + role.slice(1) : '';
    document.getElementById('portal-label').textContent   = role === 'mentor' ? 'Mentor Portal' : 'Mentee Portal';

    document.getElementById('sidebar-nav').innerHTML = role === 'mentor' ? `
      <div class="nav-section-label">Main</div>
      <a class="nav-item" href="${dashLink}"><span class="icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>Dashboard</a>
      <a class="nav-item" href="find-mentee.html"><span class="icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>Find a Mentee</a>
      <a class="nav-item" href="dashboard-mentor.html#requests"><span class="icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>Mentee Requests</a>
      <a class="nav-item" href="calendar.html"><span class="icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>My Sessions</a>
      <a class="nav-item active" href="chat.html"><span class="icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>Messages</a>
      <a class="nav-item" href="progress.html"><span class="icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>My Progress</a>
      <div class="nav-section-label" style="margin-top:8px;">Settings</div>
      <a class="nav-item" href="profile.html"><span class="icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>My Profile</a>
      <a class="nav-item" href="profile.html"><span class="icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg></span>Availability</a>` : `
      <div class="nav-section-label">Main</div>
      <a class="nav-item" href="${dashLink}">
        <span class="icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>
        Dashboard
      </a>
      <a class="nav-item" href="find-mentor.html">
        <span class="icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        Find a Mentor
      </a>
      <a class="nav-item" href="calendar.html">
        <span class="icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        My Sessions
      </a>
      <a class="nav-item active" href="chat.html">
        <span class="icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
        Messages
      </a>
      <a class="nav-item" href="progress.html">
        <span class="icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
        My Progress
      </a>
      <div class="nav-section-label" style="margin-top:8px;">Account</div>
      <a class="nav-item" href="profile.html">
        <span class="icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        My Profile
      </a>
    `;

    function signOut() {
      ['fa_token','fa_role','fa_name','fa_id'].forEach(k => localStorage.removeItem(k));
      location.href = 'login.html';
    }

    /* ── State ────────────────────────────────────────────── */
    let conversations   = [];
    let activeConvId    = null;   // connectionId
    let activeConv      = null;   // full conversation object
    let oldestMsgDate   = null;
    let hasMore         = false;
    let typingTimer     = null;
    let isTyping        = false;

    /* ── Socket ───────────────────────────────────────────── */
    const socket = io({ auth: { token } });

    socket.on('connect', () => {
      if (activeConvId) socket.emit('join_chat_room', { connectionId: activeConvId });
    });

    socket.on('chat_message', (msg) => {
      if (msg.connectionId !== activeConvId) {
        // update unread count in sidebar
        updateUnreadBadge(msg.connectionId, 1);
        return;
      }
      appendMessage(msg, false);
      scrollToBottom();
      // mark as read
      fetch(`/api/chat/read/${activeConvId}`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
      });
      // clear badge for active conv
      updateUnreadBadge(activeConvId, 0);
      // update preview in conv list
      updateConvPreview(msg.connectionId, msg.text);
    });

    socket.on('chat_notification', (n) => {
      updateUnreadBadge(n.connectionId, 1);
      updateConvPreview(n.connectionId, n.text);
    });

    socket.on('typing_start', ({ userId, name }) => {
      if (userId === myId) return;
      document.getElementById('typing-name').textContent = name || 'Someone';
      document.getElementById('typing-indicator').classList.add('visible');
    });
    socket.on('typing_stop', () => {
      document.getElementById('typing-indicator').classList.remove('visible');
    });

    socket.on('session_scheduled', () => loadConversations());
    socket.on('session_confirmed', () => loadConversations());

    /* ── Load conversations ───────────────────────────────── */
    async function loadConversations() {
      try {
        const res  = await fetch('/api/chat/conversations', { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        conversations = data.conversations || [];
        renderConvList();
      } catch (err) {
        document.getElementById('conv-list').innerHTML = `<p class="conv-empty">Failed to load conversations.</p>`;
      }
    }

    function renderConvList() {
      const el = document.getElementById('conv-list');
      if (!conversations.length) {
        el.innerHTML = `<p class="conv-empty">No active connections yet.<br>Accept or get accepted to start chatting.</p>`;
        return;
      }
      el.innerHTML = conversations.map(c => {
        const av   = (c.otherName || '?').split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
        const avCls = c.otherRole === 'mentor' ? 'mentor-av' : '';
        const badge = c.unreadCount > 0 ? `<span class="conv-badge">${c.unreadCount}</span>` : '';
        const time  = c.lastMessage ? fmtTime(c.lastMessage.createdAt) : '';
        const preview = c.lastMessage
          ? `${c.lastMessage.senderName === myName ? 'You: ' : ''}${c.lastMessage.text}`
          : c.doubt ? `Doubt: ${c.doubt.slice(0,40)}…` : 'Start the conversation';
        const sel = activeConvId === c.connectionId.toString() ? ' selected' : '';
        return `<div class="conv-item${sel}" onclick="selectConv('${c.connectionId}')">
          <div class="conv-avatar ${avCls}">${av}</div>
          <div class="conv-info">
            <div class="conv-name">${esc(c.otherName)}</div>
            <div class="conv-preview">${esc(preview)}</div>
          </div>
          <div class="conv-meta">
            <span class="conv-time">${time}</span>
            ${badge}
          </div>
        </div>`;
      }).join('');
    }

    /* ── Select conversation ──────────────────────────────── */
    async function selectConv(connectionId) {
      if (activeConvId === connectionId) return;

      // leave previous room
      if (activeConvId) socket.emit('leave_chat_room', { connectionId: activeConvId });

      activeConvId = connectionId;
      activeConv   = conversations.find(c => c.connectionId.toString() === connectionId);
      oldestMsgDate = null;
      hasMore       = false;

      // join new room
      socket.emit('join_chat_room', { connectionId });

      // update UI
      renderConvList();
      showChatUI();
      await loadMessages();
    }

    function showChatUI() {
      document.getElementById('no-chat').style.display    = 'none';
      document.getElementById('chat-header').style.display = '';
      document.getElementById('messages-area').style.display = '';
      document.getElementById('input-bar').style.display  = '';

      if (!activeConv) return;
      const av   = (activeConv.otherName || '?').split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
      const avEl = document.getElementById('ch-avatar');
      avEl.textContent = av;
      avEl.className   = 'chat-header-avatar' + (activeConv.otherRole === 'mentor' ? ' mentor-av' : '');
      document.getElementById('ch-name').textContent = activeConv.otherName;
      document.getElementById('ch-sub').textContent  = activeConv.otherRole.charAt(0).toUpperCase() + activeConv.otherRole.slice(1)
        + (activeConv.doubt ? ` · ${activeConv.doubt.slice(0,50)}` : '');

      // Join session button
      const joinBtn = document.getElementById('btn-join-session');
      if (activeConv.requestId) {
        joinBtn.href = `session.html?requestId=${activeConv.requestId}`;
        joinBtn.style.display = 'inline-flex';
      } else {
        joinBtn.style.display = 'none';
      }
    }

    /* ── Load messages ───────────────────────────────────── */
    async function loadMessages(before = null) {
      const area = document.getElementById('messages-area');
      if (!before) area.innerHTML = '<div class="spinner"></div>';

      try {
        let url = `/api/chat/messages/${activeConvId}?limit=50`;
        if (before) url += `&before=${encodeURIComponent(before)}`;
        const res  = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        const msgs = data.messages || [];
        hasMore = msgs.length === 50;

        if (!before) {
          area.innerHTML = '';
          if (hasMore) {
            area.prepend(makeLoadMoreBtn());
          }
        } else {
          // prepend older messages
          const scrollH = area.scrollHeight;
          if (!hasMore) document.getElementById('load-more-btn')?.remove();
          msgs.forEach(m => area.insertBefore(renderMsgEl(m), area.firstChild));
          area.scrollTop = area.scrollHeight - scrollH;
          return;
        }

        if (!msgs.length) {
          area.innerHTML = `<div class="chat-empty"><svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>No messages yet</p><p style="font-size:12px;color:var(--muted)">Say hello!</p></div>`;
        } else {
          if (hasMore) area.appendChild(makeLoadMoreBtn());
          msgs.forEach(m => area.appendChild(renderMsgEl(m)));
          scrollToBottom();
        }

        if (msgs.length) {
          oldestMsgDate = msgs[0].createdAt;
        }

        // mark as read
        updateUnreadBadge(activeConvId, 0);
        fetch(`/api/chat/read/${activeConvId}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
        });

      } catch (err) {
        area.innerHTML = `<p style="color:var(--muted);text-align:center;padding:40px">Failed to load messages.</p>`;
      }
    }

    function makeLoadMoreBtn() {
      const btn = document.createElement('button');
      btn.className = 'load-more-btn';
      btn.id = 'load-more-btn';
      btn.textContent = 'Load older messages';
      btn.onclick = () => loadMessages(oldestMsgDate);
      return btn;
    }

    /* ── Render single message ────────────────────────────── */
    function renderMsgEl(msg) {
      const isMine = (msg.senderId || msg.sender?._id || msg.sender)?.toString() === myId;
      const senderName = msg.senderName || msg.sender?.fullName || (isMine ? myName : '?');
      const av = senderName.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();

      const wrap = document.createElement('div');
      wrap.className = 'msg-row' + (isMine ? ' mine' : '');
      wrap.innerHTML = `
        <div class="msg-sender-av ${isMine ? 'mine-av' : (activeConv?.otherRole === 'mentor' ? 'mentor-av' : '')}">${av}</div>
        <div>
          <div class="msg-bubble">${esc(msg.text)}</div>
          <div class="msg-meta">${fmtTime(msg.createdAt)}</div>
        </div>`;
      return wrap;
    }

    /* ── Append new incoming message ─────────────────────── */
    function appendMessage(msg, scrollDown = true) {
      const area = document.getElementById('messages-area');
      // remove empty state if present
      area.querySelector('.chat-empty')?.remove();
      area.appendChild(renderMsgEl(msg));
      if (scrollDown) scrollToBottom();
      // update conv preview
      updateConvPreview(msg.connectionId, msg.text);
    }

    /* ── Send message ────────────────────────────────────── */
    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const text  = input.value.trim();
      if (!text || !activeConvId) return;

      input.value = '';
      autoResize(input);
      stopTyping();

      socket.emit('send_chat_message', { connectionId: activeConvId, text });
    }

    /* ── Typing indicators ───────────────────────────────── */
    document.getElementById('msg-input').addEventListener('input', function() {
      autoResize(this);
      if (!activeConvId) return;
      if (!isTyping) {
        isTyping = true;
        socket.emit('typing_start', { connectionId: activeConvId });
      }
      clearTimeout(typingTimer);
      typingTimer = setTimeout(stopTyping, 2000);
    });
    document.getElementById('msg-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function stopTyping() {
      if (isTyping && activeConvId) {
        isTyping = false;
        socket.emit('typing_stop', { connectionId: activeConvId });
      }
      clearTimeout(typingTimer);
    }

    /* ── Schedule modal ──────────────────────────────────── */
    function openScheduleModal() {
      if (!activeConvId) return;
      // default to tomorrow at 10am
      const d = new Date(); d.setDate(d.getDate()+1); d.setHours(10,0,0,0);
      document.getElementById('sched-time').value = d.toISOString().slice(0,16);
      document.getElementById('sched-notes').value = '';
      document.getElementById('sched-error').style.display = 'none';
      document.getElementById('sched-modal').classList.add('open');
    }
    function closeScheduleModal() {
      document.getElementById('sched-modal').classList.remove('open');
    }

    async function proposeSession() {
      const errEl = document.getElementById('sched-error');
      errEl.style.display = 'none';

      const scheduledTime = document.getElementById('sched-time').value;
      const durationMins  = parseInt(document.getElementById('sched-duration').value);
      const notes         = document.getElementById('sched-notes').value.trim();

      if (!scheduledTime) { errEl.textContent='Please pick a date/time.'; errEl.style.display='block'; return; }
      if (new Date(scheduledTime) < new Date()) { errEl.textContent='Please pick a future time.'; errEl.style.display='block'; return; }

      if (!activeConv) return;
      try {
        const res = await fetch('/api/sessions/propose', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ requestId: activeConv.connectionId, scheduledTime, durationMins, notes }),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.message || 'Failed to propose session.';
          errEl.style.display = 'block';
          return;
        }
        closeScheduleModal();
        // send a chat message about the proposal
        socket.emit('send_chat_message', {
          connectionId: activeConvId,
          text: `📅 Session proposed for ${new Date(scheduledTime).toLocaleString()} (${durationMins} min)${notes ? ' — ' + notes : ''}`,
        });
      } catch (err) {
        errEl.textContent = 'Network error. Try again.';
        errEl.style.display = 'block';
      }
    }

    /* ── Helpers ─────────────────────────────────────────── */
    function scrollToBottom() {
      const area = document.getElementById('messages-area');
      area.scrollTop = area.scrollHeight;
    }

    function updateUnreadBadge(connectionId, delta) {
      // delta = 0 means clear, positive means increment
      const conv = conversations.find(c => c.connectionId.toString() === connectionId?.toString());
      if (!conv) return;
      if (delta === 0) {
        conv.unreadCount = 0;
      } else {
        conv.unreadCount = (conv.unreadCount || 0) + delta;
      }
      renderConvList();
    }

    function updateConvPreview(connectionId, text) {
      const conv = conversations.find(c => c.connectionId.toString() === connectionId?.toString());
      if (!conv) return;
      conv.lastMessage = { text, createdAt: new Date().toISOString(), senderName: myName };
      // re-sort
      conversations.sort((a,b) => {
        const ta = a.lastMessage?.createdAt || 0;
        const tb = b.lastMessage?.createdAt || 0;
        return new Date(tb) - new Date(ta);
      });
      renderConvList();
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function esc(str) {
      return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function fmtTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const now = new Date();
      const diffDays = Math.floor((now - d) / 86400000);
      if (diffDays === 0) return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      if (diffDays === 1) return 'Yesterday';
      if (diffDays < 7)  return d.toLocaleDateString([], {weekday:'short'});
      return d.toLocaleDateString([], {month:'short', day:'numeric'});
    }

    /* ── Check URL param for preselected conversation ─────── */
    const urlParams = new URLSearchParams(location.search);
    const preselect = urlParams.get('connectionId');

    /* ── Boot ────────────────────────────────────────────── */
    loadConversations().then(() => {
      if (preselect) selectConv(preselect);
    });
  </script>
