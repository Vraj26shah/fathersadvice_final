<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Sessions — Father's Advice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black:       #0a0a08;
      --white:       #ffffff;
      --muted:       #6b6b65;
      --accent:      #5e6ad2;
      --accent-deep: #4a54b8;
      --accent-border: rgba(94,106,210,0.35);
      --accent-glow:   rgba(94,106,210,0.12);
      --gold:        #c8a84b;
      --gold-deep:   #a8882b;
      --gold-border: rgba(200,168,75,0.35);
      --green:       #4ade80;
      --green-bg:    rgba(74,222,128,0.12);
      --green-border:rgba(74,222,128,0.3);
      --card-bg:     #141412;
      --border:      rgba(255,255,255,0.08);
      --serif:       'Playfair Display', Georgia, serif;
      --sans:        'Inter', system-ui, sans-serif;
      --radius:      12px;
      --sidebar-w:   240px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body { font-family: var(--sans); background: var(--black); color: var(--white); min-height: 100vh; display: flex; }

    /* ── Sidebar ── */
    .sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--card-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; }
    .sidebar-logo { padding: 28px 24px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .logo-mark { width: 36px; height: 36px; background: var(--white); border: 1.5px solid var(--gold-border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-mark-text { font-family: var(--serif); font-size: 11px; font-weight: 700; color: var(--black); letter-spacing: -1px; }
    .logo-mark-text .bar { color: var(--gold-deep); font-style: normal; }
    .logo-name { font-family: var(--serif); font-size: 14px; color: var(--white); line-height: 1.2; }
    .logo-name span { display: block; font-size: 10px; font-family: var(--sans); color: var(--muted); font-weight: 400; margin-top: 1px; letter-spacing: 0.5px; text-transform: uppercase; }
    .sidebar-nav { flex: 1; padding: 16px 0; }
    .nav-section-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 16px 24px 8px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 24px; color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.2s; font-size: 14px; font-weight: 500; border-left: 2px solid transparent; text-decoration: none; }
    .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.04); }
    .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-glow); }
    .sidebar-footer { border-top: 1px solid var(--border); padding: 16px 20px; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .user-meta .name { font-size: 13px; font-weight: 600; }
    .user-meta .role { font-size: 11px; color: var(--muted); }
    .logout-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; border-radius: 4px; margin-left: auto; display: flex; align-items: center; }
    .logout-btn:hover { color: var(--white); }

    /* ── Main ── */
    .main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; position: sticky; top: 0; background: rgba(10,10,8,0.9); backdrop-filter: blur(12px); z-index: 50; }
    .topbar-title { font-size: 15px; font-weight: 600; }
    .badge-role { border: 1px solid var(--accent-border); background: var(--accent-glow); color: var(--accent); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .page-body { padding: 28px; display: grid; grid-template-columns: 1fr 340px; gap: 24px; align-items: start; }

    /* ── Calendar card ── */
    .cal-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border); }
    .cal-month-title { font-family: var(--serif); font-size: 20px; font-weight: 700; }
    .cal-nav { display: flex; gap: 6px; align-items: center; }
    .cal-nav-btn { background: rgba(255,255,255,0.07); border: 1px solid var(--border); color: var(--white); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: background 0.15s; }
    .cal-nav-btn:hover { background: rgba(255,255,255,0.14); }
    .today-btn { background: var(--accent-glow); border: 1px solid var(--accent-border); color: var(--accent); font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 8px; cursor: pointer; }

    /* ── Grid ── */
    .cal-grid { padding: 16px; }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 8px; }
    .cal-wd { text-align: center; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 0; }
    .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day {
      min-height: 72px; padding: 6px; border-radius: 8px;
      cursor: pointer; transition: background 0.15s; position: relative;
      border: 1px solid transparent;
    }
    .cal-day:hover { background: rgba(255,255,255,0.04); }
    .cal-day.empty { cursor: default; pointer-events: none; }
    .cal-day.today { border-color: var(--accent); background: var(--accent-glow); }
    .cal-day.selected { background: rgba(94,106,210,0.18); border-color: var(--accent); }
    .cal-day.has-sessions { }
    .day-num { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
    .cal-day.today .day-num { color: var(--accent); font-weight: 700; }
    .session-dots { display: flex; flex-direction: column; gap: 2px; }
    .session-dot {
      font-size: 10px; font-weight: 600; padding: 2px 5px; border-radius: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dot-confirmed { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .dot-proposed  { background: rgba(200,168,75,0.12); color: var(--gold); border: 1px solid var(--gold-border); }
    .dot-completed { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid rgba(255,255,255,0.08); }
    .more-chip { font-size: 10px; color: var(--muted); padding: 1px 4px; }

    /* ── Day detail panel ── */
    .detail-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; position: sticky; top: 88px; }
    .detail-header { padding: 18px 22px; border-bottom: 1px solid var(--border); }
    .detail-date { font-family: var(--serif); font-size: 18px; font-weight: 700; }
    .detail-sub  { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .detail-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .session-card {
      border: 1px solid var(--border); border-radius: 10px; padding: 14px;
      transition: border-color 0.15s;
    }
    .session-card.confirmed { border-color: var(--green-border); background: rgba(74,222,128,0.04); }
    .session-card.proposed  { border-color: var(--gold-border);  background: rgba(200,168,75,0.04); }
    .session-card.completed { border-color: rgba(255,255,255,0.06); opacity: 0.6; }
    .sc-time { font-size: 16px; font-weight: 700; font-family: var(--serif); }
    .sc-dur  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .sc-who  { font-size: 13px; color: rgba(255,255,255,0.75); margin-top: 8px; }
    .sc-notes{ font-size: 12px; color: var(--muted); margin-top: 4px; font-style: italic; }
    .sc-status { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; margin-top: 8px; }
    .sc-status.confirmed { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .sc-status.proposed  { background: rgba(200,168,75,0.1); color: var(--gold); border: 1px solid var(--gold-border); }
    .sc-status.completed { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid rgba(255,255,255,0.08); }
    .sc-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .btn-join   { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); padding: 6px 14px; border-radius: 7px; font-size: 12px; font-weight: 700; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
    .btn-join:hover { background: rgba(74,222,128,0.22); }
    .btn-complete { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7); border: 1px solid var(--border); padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-complete:hover { background: rgba(255,255,255,0.12); }
    .btn-cancel   { background: transparent; color: #e05c5c; border: 1px solid rgba(224,92,92,0.3); padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-cancel:hover { background: rgba(224,92,92,0.08); }
    .no-sessions { text-align: center; padding: 32px 20px; color: var(--muted); font-size: 14px; }

    /* ── Limit banner ── */
    .limit-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 22px; background: rgba(200,168,75,0.08); border-bottom: 1px solid var(--gold-border); font-size: 13px; }
    .limit-bar.full { background: rgba(224,92,92,0.08); border-color: rgba(224,92,92,0.3); color: #e05c5c; }
    .limit-pips { display: flex; gap: 5px; }
    .pip { width: 10px; height: 10px; border-radius: 50%; }
    .pip.active { background: var(--gold); }
    .pip.empty  { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); }

    /* ── Spinner ── */
    .spinner { width: 28px; height: 28px; border: 3px solid rgba(94,106,210,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 40px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 900px) {
      .page-body { grid-template-columns: 1fr; }
      .detail-panel { position: static; }
    }
    @media (max-width: 700px) {
      :root { --sidebar-w: 0px; }
      .sidebar { transform: translateX(-100%); }
      .main { margin-left: 0; }
      .page-body { padding: 16px; }
    }
  </style>
</head>
<body>

  <!-- ═══ Sidebar ══════════════════════════════════════════ -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark"><span class="logo-mark-text">F<i class="bar">|</i>A</span></div>
      <div class="logo-name">Father's Advice<span id="portal-label">Portal</span></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebar-avatar">—</div>
        <div class="user-meta">
          <div class="name" id="sidebar-name">—</div>
          <div class="role" id="sidebar-role">—</div>
        </div>
        <button class="logout-btn" onclick="signOut()">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ═══ Main ════════════════════════════════════════════ -->
  <main class="main">
    <header class="topbar">
      <div class="topbar-title">My Sessions</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span id="session-count-badge" style="font-size:12px;color:var(--muted);"></span>
        <span class="badge-role" id="role-badge">—</span>
      </div>
    </header>

    <div class="page-body">

      <!-- Calendar -->
      <div>
        <div class="cal-card" id="cal-card">
          <div class="cal-header">
            <div class="cal-month-title" id="cal-title">—</div>
            <div class="cal-nav">
              <button class="today-btn" onclick="goToday()">Today</button>
              <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
              <button class="cal-nav-btn" onclick="changeMonth(+1)">›</button>
            </div>
          </div>
          <!-- Session limit indicator -->
          <div class="limit-bar" id="limit-bar" style="display:none;">
            <span id="limit-text"></span>
            <div class="limit-pips" id="limit-pips"></div>
          </div>
          <div class="cal-grid">
            <div class="cal-weekdays">
              <div class="cal-wd">Sun</div><div class="cal-wd">Mon</div>
              <div class="cal-wd">Tue</div><div class="cal-wd">Wed</div>
              <div class="cal-wd">Thu</div><div class="cal-wd">Fri</div>
              <div class="cal-wd">Sat</div>
            </div>
            <div class="cal-days" id="cal-days">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Detail panel -->
      <div class="detail-panel" id="detail-panel">
        <div class="detail-header">
          <div class="detail-date" id="detail-date">Select a day</div>
          <div class="detail-sub" id="detail-sub">Click on any day to see sessions</div>
        </div>
        <div class="detail-body" id="detail-body">
          <div class="no-sessions">No day selected.</div>
        </div>
      </div>

    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    /* ── Auth ────────────────────────────────────────────── */
    const token = localStorage.getItem('fa_token');
    const role  = localStorage.getItem('fa_role') || 'mentee';
    if (!token) { window.location.href = '/login.html'; }

    const storedName = localStorage.getItem('fa_name') || 'User';
    const initials   = storedName.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
    document.getElementById('sidebar-avatar').textContent = initials;
    document.getElementById('sidebar-name').textContent   = storedName;
    document.getElementById('sidebar-role').textContent   = role.charAt(0).toUpperCase() + role.slice(1);
    document.getElementById('portal-label').textContent   = role === 'mentor' ? 'Mentor Portal' : 'Mentee Portal';
    document.getElementById('role-badge').textContent     = role.charAt(0).toUpperCase() + role.slice(1);

    /* ── Sidebar nav (role-aware) ────────────────────────── */
    const dashLink = role === 'mentor' ? 'dashboard-mentor.html' : 'dashboard-mentee.html';
    document.getElementById('sidebar-nav').innerHTML = role === 'mentor' ? `
      <div class="nav-section-label">Main</div>
      <a class="nav-item" href="${dashLink}"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a class="nav-item" href="find-mentee.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Find a Mentee</a>
      <a class="nav-item" href="dashboard-mentor.html#requests"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Mentee Requests</a>
      <a class="nav-item active" href="calendar.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>My Sessions</a>
      <a class="nav-item" href="chat.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Messages</a>
      <a class="nav-item" href="progress.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>My Progress</a>
      <div class="nav-section-label" style="margin-top:8px;">Settings</div>
      <a class="nav-item" href="profile.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>My Profile</a>
      <a class="nav-item" href="profile.html"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>Availability</a>` : `
      <div class="nav-section-label">Main</div>
      <a class="nav-item" href="${dashLink}">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a class="nav-item" href="find-mentor.html">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Find a Mentor
      </a>
      <a class="nav-item active" href="calendar.html">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        My Sessions
      </a>
      <a class="nav-item" href="chat.html">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Messages
      </a>
      <a class="nav-item" href="progress.html">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        My Progress
      </a>
      <div class="nav-section-label" style="margin-top:8px;">Account</div>
      <a class="nav-item" href="profile.html">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        My Profile
      </a>`;

    /* ── State ───────────────────────────────────────────── */
    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    let curYear  = new Date().getFullYear();
    let curMonth = new Date().getMonth();
    let allSessions = [];   // sessions for current month
    let activeCount  = 0;   // active (proposed+confirmed) across all connections
    let selectedDay  = null;

    /* ── Load sessions for month ─────────────────────────── */
    async function loadCalendar(year, month) {
      document.getElementById('cal-days').innerHTML = '<div class="spinner"></div>';
      try {
        const res  = await fetch(`/api/sessions/calendar?year=${year}&month=${month}`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        allSessions = data.sessions || [];

        // Compute total active count across all connections this month
        activeCount = Object.values(data.activeCounts || {}).reduce((a, b) => Math.max(a, b), 0);

        renderLimitBar();
        renderCalendar(year, month);
        updateCountBadge();

        // Re-render selected day if still in view
        if (selectedDay) renderDayDetail(selectedDay);
      } catch (err) {
        document.getElementById('cal-days').innerHTML =
          `<div style="color:#e05c5c;padding:24px;font-size:14px;">${err.message}</div>`;
      }
    }

    /* ── Render calendar grid ────────────────────────────── */
    function renderCalendar(year, month) {
      document.getElementById('cal-title').textContent = `${MONTHS[month]} ${year}`;
      const firstDay    = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today       = new Date();

      // Group sessions by day
      const byDay = {};
      for (const s of allSessions) {
        const d = new Date(s.scheduledTime).getDate();
        if (!byDay[d]) byDay[d] = [];
        byDay[d].push(s);
      }

      // Build cells
      const cells = [];
      for (let i = 0; i < firstDay; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(d);
      while (cells.length % 7 !== 0) cells.push(null);

      const container = document.getElementById('cal-days');
      container.innerHTML = cells.map(day => {
        if (!day) return `<div class="cal-day empty"></div>`;

        const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
        const isSelected = selectedDay === day;
        const sessions = byDay[day] || [];
        const cls = ['cal-day', isToday ? 'today' : '', isSelected ? 'selected' : '', sessions.length ? 'has-sessions' : ''].filter(Boolean).join(' ');

        const visible  = sessions.slice(0, 2);
        const overflow = sessions.length - 2;
        const dotsHtml = visible.map(s => {
          const t = new Date(s.scheduledTime);
          const time = t.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
          return `<div class="session-dot dot-${s.status}">${time}</div>`;
        }).join('') + (overflow > 0 ? `<div class="more-chip">+${overflow} more</div>` : '');

        return `<div class="${cls}" onclick="selectDay(${day})">
          <div class="day-num">${day}</div>
          <div class="session-dots">${dotsHtml}</div>
        </div>`;
      }).join('');
    }

    /* ── Render limit bar ────────────────────────────────── */
    function renderLimitBar() {
      const bar  = document.getElementById('limit-bar');
      const text = document.getElementById('limit-text');
      const pips = document.getElementById('limit-pips');

      // Count all active sessions across all requests
      const totalActive = allSessions.filter(s => s.status === 'proposed' || s.status === 'confirmed').length;
      if (totalActive === 0) { bar.style.display = 'none'; return; }

      bar.style.display = 'flex';
      const isFull = totalActive >= 5;
      bar.className = 'limit-bar' + (isFull ? ' full' : '');
      text.textContent = isFull
        ? '5/5 sessions active — complete sessions to schedule more'
        : `${totalActive}/5 sessions active this period`;
      pips.innerHTML = Array.from({ length: 5 }, (_, i) =>
        `<div class="pip ${i < totalActive ? 'active' : 'empty'}"></div>`
      ).join('');
    }

    /* ── Select a day ────────────────────────────────────── */
    function selectDay(day) {
      selectedDay = day;
      renderCalendar(curYear, curMonth);
      renderDayDetail(day);
    }

    /* ── Render day detail ───────────────────────────────── */
    function renderDayDetail(day) {
      const date = new Date(curYear, curMonth, day);
      const dateStr = date.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      document.getElementById('detail-date').textContent = dateStr;

      const daySessions = allSessions.filter(s => new Date(s.scheduledTime).getDate() === day);
      const countEl = document.getElementById('detail-sub');
      countEl.textContent = daySessions.length ? `${daySessions.length} session${daySessions.length !== 1 ? 's' : ''}` : 'No sessions';

      const body = document.getElementById('detail-body');
      if (!daySessions.length) {
        body.innerHTML = '<div class="no-sessions">No sessions on this day.</div>';
        return;
      }

      body.innerHTML = daySessions.map(s => {
        const t     = new Date(s.scheduledTime);
        const time  = t.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
        const other = role === 'mentor' ? s.mentee?.fullName : s.mentor?.fullName;
        const otherRole = role === 'mentor' ? 'Mentee' : 'Mentor';
        const sessionUrl = `session.html?requestId=${s.request}`;

        // Can join if within 15 min before or during session
        const now = Date.now();
        const start  = new Date(s.scheduledTime).getTime();
        const endT   = start + s.durationMins * 60000;
        const canJoin = now >= start - 15 * 60000 && now <= endT + 5 * 60000;

        let actions = '';
        if (s.status === 'confirmed') {
          if (canJoin) {
            actions += `<a class="btn-join" href="${sessionUrl}"><div style="width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink-sm 1s infinite;"></div> Join Now</a>`;
          }
          actions += `<button class="btn-complete" onclick="markComplete('${s._id}')">Mark Complete</button>`;
          actions += `<button class="btn-cancel" onclick="cancelSession('${s._id}')">Cancel</button>`;
        } else if (s.status === 'proposed') {
          if (role !== s.proposedBy) {
            actions += `<button class="btn-join" style="background:var(--accent-glow);color:var(--accent);border-color:var(--accent-border);" onclick="confirmSession('${s._id}')">✓ Confirm</button>`;
          }
          actions += `<button class="btn-cancel" onclick="cancelSession('${s._id}')">Cancel</button>`;
        }

        return `
          <div class="session-card ${s.status}" id="sc-${s._id}">
            <div class="sc-time">${time}</div>
            <div class="sc-dur">${s.durationMins} min</div>
            <div class="sc-who">${otherRole}: <strong>${other || '—'}</strong></div>
            ${s.notes ? `<div class="sc-notes">${s.notes}</div>` : ''}
            <div class="sc-status ${s.status}">
              ${s.status === 'confirmed' ? '● Confirmed' : s.status === 'proposed' ? '◌ Proposed' : '✓ Completed'}
            </div>
            ${actions ? `<div class="sc-actions">${actions}</div>` : ''}
          </div>`;
      }).join('');
    }

    /* ── Actions ─────────────────────────────────────────── */
    async function confirmSession(sessionId) {
      await apiPost(`/api/sessions/confirm/${sessionId}`, 'Session confirmed!');
    }
    async function markComplete(sessionId) {
      await apiPost(`/api/sessions/complete/${sessionId}`, 'Session marked as complete.');
    }
    async function cancelSession(sessionId) {
      if (!confirm('Cancel this session?')) return;
      await apiPost(`/api/sessions/cancel/${sessionId}`, 'Session cancelled.');
    }
    async function apiPost(url, successMsg) {
      try {
        const res  = await fetch(url, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        showToast(successMsg);
        loadCalendar(curYear, curMonth);
      } catch (err) { showToast(err.message); }
    }

    /* ── Navigation ──────────────────────────────────────── */
    function changeMonth(delta) {
      curMonth += delta;
      if (curMonth < 0)  { curMonth = 11; curYear--; }
      if (curMonth > 11) { curMonth = 0;  curYear++; }
      selectedDay = null;
      loadCalendar(curYear, curMonth);
    }
    function goToday() {
      curYear  = new Date().getFullYear();
      curMonth = new Date().getMonth();
      selectedDay = new Date().getDate();
      loadCalendar(curYear, curMonth);
    }

    /* ── Count badge ─────────────────────────────────────── */
    function updateCountBadge() {
      const upcoming = allSessions.filter(s =>
        (s.status === 'confirmed' || s.status === 'proposed') &&
        new Date(s.scheduledTime) > Date.now()
      ).length;
      document.getElementById('session-count-badge').textContent =
        upcoming ? `${upcoming} upcoming` : '';
    }

    /* ── Toast ───────────────────────────────────────────── */
    function showToast(msg) {
      const t = document.createElement('div');
      t.textContent = msg;
      Object.assign(t.style, {
        position:'fixed', bottom:'28px', right:'28px',
        background:'var(--accent)', color:'#fff',
        fontWeight:'600', fontSize:'14px',
        padding:'12px 20px', borderRadius:'10px',
        boxShadow:'0 6px 24px rgba(0,0,0,0.4)',
        zIndex:'9999', opacity:'0', transition:'opacity 0.3s,transform 0.3s',
        transform:'translateY(10px)',
      });
      document.body.appendChild(t);
      requestAnimationFrame(() => { t.style.opacity='1'; t.style.transform='translateY(0)'; });
      setTimeout(() => { t.style.opacity='0'; t.style.transform='translateY(10px)'; setTimeout(() => t.remove(), 300); }, 3500);
    }

    /* ── Socket.io — refresh on session events ───────────── */
    (function initSocket() {
      if (typeof io === 'undefined') return;
      const socket = io({ auth: { token } });
      socket.on('session_scheduled',  () => loadCalendar(curYear, curMonth));
      socket.on('session_confirmed',  () => loadCalendar(curYear, curMonth));
      socket.on('request_accepted',   () => loadCalendar(curYear, curMonth));
    })();

    /* ── Sign out ────────────────────────────────────────── */
    function signOut() {
      ['fa_token','fa_role','fa_name'].forEach(k => localStorage.removeItem(k));
      window.location.href = '/login.html';
    }

    /* ── Init ────────────────────────────────────────────── */
    selectedDay = new Date().getDate();
    loadCalendar(curYear, curMonth);
  </script>
</body>
</html>
